<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Royale Portal — Card Collection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="hero">
    <div class="container">
      <div class="hero-top">
        <h1>🏆 Royale Portal</h1>
        <form id="lookup-form" class="lookup-form">
          <input type="text" id="tag-input" placeholder="#92LCJ898U" required />
          <button type="submit" class="btn-primary">Search</button>
          <button type="button" id="mine-btn" class="btn-secondary">👤 Mine</button>
        </form>
      </div>
      <div id="player-bar" class="player-bar hidden">
        <span id="pname" class="pname"></span>
        <span id="ptag" class="ptag"></span>
        <span id="pstats" class="pstats"></span>
        <span id="cache-status" class="cache-status hidden">💾 Caching images…</span>
      </div>
    </div>
  </header>

  <main class="container">

    <div id="loading" class="loading-card hidden">
      <div class="spinner"></div>
      <p id="loading-text">Loading…</p>
    </div>

    <div id="error" class="error-card hidden">
      <p id="error-msg"></p>
    </div>

    <div id="content" class="hidden">
      <div class="controls">
        <div class="rarity-ms" id="rarity-ms">
          <button class="ms-btn" id="rarity-btn">Rarity ▾</button>
          <div class="ms-dropdown" id="rarity-dropdown">
            <label class="ms-opt"><input type="checkbox" value="all" checked /> <span>All</span></label>
            <label class="ms-opt"><input type="checkbox" value="common" /> <span>Common</span></label>
            <label class="ms-opt"><input type="checkbox" value="rare" /> <span>Rare</span></label>
            <label class="ms-opt"><input type="checkbox" value="epic" /> <span>Epic</span></label>
            <label class="ms-opt"><input type="checkbox" value="legendary" /> <span>Legendary</span></label>
            <label class="ms-opt"><input type="checkbox" value="champion" /> <span>Champion</span></label>
            <label class="ms-opt"><input type="checkbox" value="tower" /> <span>Tower Troop</span></label>
          </div>
        </div>
        <select id="sort-select">
          <option value="upgrade">Upgrade Priority</option>
          <option value="level">Level ↓</option>
          <option value="rarity-group">Rarity + Level</option>
        </select>
        <input type="text" id="search-input" placeholder="🔍 Search cards…" />
        <span id="count-label" class="count-label"></span>
      </div>
      <div id="card-grid" class="card-grid">
        <div class="empty-state">Enter a player tag to see your cards</div>
      </div>
    </div>

  </main>

  <footer class="footer">
    <div class="container">
      <p>Royale Portal — Not affiliated with Supercell.</p>
      <p>Data from <a href="https://developer.clashroyale.com" target="_blank">Clash Royale API</a></p>
    </div>
  </footer>

  <script src="player-config.js"></script>
  <script src="config.js"></script>
  <script src="card-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
